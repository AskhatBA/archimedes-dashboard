server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets emitted by Vite
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — let the client router handle unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache the entry document so deploys take effect immediately
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
